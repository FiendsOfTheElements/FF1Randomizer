version: 2.1

defaults: &defaults

  working_directory: ~/ff1randomizer
  docker:
    - image: fiendsoftheelements/netlify-build:dotnet10

orbs:
  shellcheck: circleci/shellcheck@1.3.16

jobs:
  build:
    <<: *defaults
    steps:
      - checkout
      - run:
          name: publish
          command: .circleci/build.sh
      - persist_to_workspace:
          root: ~/ff1randomizer/FF1Blazorizer/output
          paths:
            - wwwroot

  deploy:
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/ff1randomizer/FF1Blazorizer/output
      - run:
          name: deploy
          command: .circleci/deploy.sh

workflows:
  main:
    jobs:
      - shellcheck/check:
          path: ".circleci/"
      - build:
          requires:
            - shellcheck/check
      - hold:
          type: approval
      - deploy:
          requires:
            - hold
            - build
